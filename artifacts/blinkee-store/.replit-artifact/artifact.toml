kind = "web"
previewPath = "/"
title = "Blinkee.com - LED Toys Store"
version = "1.0.0"
id = "artifacts/blinkee-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22157

[services.development]
run = "pnpm --filter @workspace/blinkee-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blinkee-store", "run", "build" ]
publicDir = "artifacts/blinkee-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22157"
BASE_PATH = "/"
